2. Allow adding a border to an element by just adding a border-width. (https://github.com/tailwindcss/tailwindcss/pull/116)
*/

*,
::before,
::after {
  box-sizing: border-box; /* 1 */
  border-width: 0; /* 2 */
  border-style: solid; /* 2 */
  border-color: #e5e7eb; /* 2 */
}

::before,
::after {
  --tw-content: '';
}

/*
1. Use a consistent sensible line-height in all browsers.
2. Prevent adjustments of font size after orientation changes in iOS.
3. Use a more readable tab size.
4. Use the user's configured `sans` font-family by default.
5. Use the user's configured `sans` font-feature-settings by default.
6. Use the user's configured `sans` font-variation-settings by default.
7. Disable tap highlights on iOS
*/

html,
:host {
  line-height: 1.5; /* 1 */
  -webkit-text-size-adjust: 100%; /* 2 */
  -moz-tab-size: 4; /* 3 */
  -o-tab-size: 4;
     tab-size: 4; /* 3 */
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; /* 4 */
  font-feature-settings: normal; /* 5 */
  font-variation-settings: normal; /* 6 */
  -webkit-tap-highlight-color: transparent; /* 7 */
}

/*
1. Remove the margin in all browsers.
2. Inherit line-height from `html` so users can set them as a class directly on the `html` element.
*/

body {
  margin: 0; /* 1 */
  line-height: inherit; /* 2 */
}

/*
1. Add the correct height in Firefox.
2. Correct the inheritance of border color in Firefox. (https://bugzilla.mozilla.org/show_bug.cgi?id=190655)
3. Ensure horizontal rules are visible by default.
*/

hr {
  height: 0; /* 1 */
  color: inherit; /* 2 */
  border-top-width: 1px; /* 3 */
}

/*
Add the correct text decoration in Chrome, Edge, and Safari.
*/

abbr:where([title]) {
  -webkit-text-decoration: underline dotted;
          text-decoration: underline dotted;
}

/*
Remove the default font size and weight for headings.
*/

h1,
h2,
h3,
h4,
h5,
h6 {
  font-size: inherit;
  font-weight: inherit;
}

/*
Reset links to optimize for opt-in styling instead of opt-out.
*/

a {
  color: inherit;
  text-decoration: inherit;
}

/*
Add the correct font weight in Edge and Safari.
*/

b,
strong {
  font-weight: bolder;
}

/*
1. Use the user's configured `mono` font-family by default.
2. Use the user's configured `mono` font-feature-settings by default.
3. Use the user's configured `mono` font-variation-settings by default.
4. Correct the odd `em` font sizing in all browsers.
*/

code,
kbd,
samp,
pre {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; /* 1 */
  font-feature-settings: normal; /* 2 */
  font-variation-settings: normal; /* 3 */
  font-size: 1em; /* 4 */
}

/*
Add the correct font size in all browsers.
*/

small {
  font-size: 80%;
}

/*
Prevent `sub` and `sup` elements from affecting the line height in all browsers.
*/

sub,
sup {
  font-size: 75%;
  line-height: 0;
  position: relative;
  vertical-align: baseline;
}

sub {
  bottom: -0.25em;
}

sup {
  top: -0.5em;
}

/*
1. Remove text indentation from table contents in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=999088, https://bugs.webkit.org/show_bug.cgi?id=201297)
2. Correct table border color inheritance in all Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=935729, https://bugs.webkit.org/show_bug.cgi?id=195016)
3. Remove gaps between table borders by default.
*/

table {
  text-indent: 0; /* 1 */
  border-color: inherit; /* 2 */
  border-collapse: collapse; /* 3 */
}

/*
1. Change the font styles in all browsers.
2. Remove the margin in Firefox and Safari.
3. Remove default padding in all browsers.
*/

button,
input,
optgroup,
select,
textarea {
  font-family: inherit; /* 1 */
  font-feature-settings: inherit; /* 1 */
  font-variation-settings: inherit; /* 1 */
  font-size: 100%; /* 1 */
  font-weight: inherit; /* 1 */
  line-height: inherit; /* 1 */
  letter-spacing: inherit; /* 1 */
  color: inherit; /* 1 */
  margin: 0; /* 2 */
  padding: 0; /* 3 */
}

/*
Remove the inheritance of text transform in Edge and Firefox.
*/

button,
select {
  text-transform: none;
}

/*
1. Correct the inability to style clickable types in iOS and Safari.
2. Remove default button styles.
*/

button,
input:where([type='button']),
input:where([type='reset']),
input:where([type='submit']) {
  -webkit-appearance: button; /* 1 */
  background-color: transparent; /* 2 */
  background-image: none; /* 2 */
}

/*
Use the modern Firefox focus style for all focusable elements.
*/

:-moz-focusring {
  outline: auto;
}

/*
Remove the additional `:invalid` styles in Firefox. (https://github.com/mozilla/gecko-dev/blob/2f9eacd9d3d995c937b4251a5557d95d494c9be1/layout/style/res/forms.css#L728-L737)
*/

:-moz-ui-invalid {
  box-shadow: none;
}

/*
Add the correct vertical alignment in Chrome and Firefox.
*/

progress {
  vertical-align: baseline;
}

/*
Correct the cursor style of increment and decrement buttons in Safari.
*/

::-webkit-inner-spin-button,
::-webkit-outer-spin-button {
  height: auto;
}

/*
1. Correct the odd appearance in Chrome and Safari.
2. Correct the outline style in Safari.
*/

[type='search'] {
  -webkit-appearance: textfield; /* 1 */
  outline-offset: -2px; /* 2 */
}

/*
Remove the inner padding in Chrome and Safari on macOS.
*/

::-webkit-search-decoration {
  -webkit-appearance: none;
}

/*
1. Correct the inability to style clickable types in iOS and Safari.
2. Change font properties to `inherit` in Safari.
*/

::-webkit-file-upload-button {
  -webkit-appearance: button; /* 1 */
  font: inherit; /* 2 */
}

/*
Add the correct display in Chrome and Safari.
*/

summary {
  display: list-item;
}

/*
Removes the default spacing and border for appropriate elements.
*/

blockquote,
dl,
dd,
h1,
h2,
h3,
h4,
h5,
h6,
hr,
figure,
p,
pre {
  margin: 0;
}

fieldset {
  margin: 0;
  padding: 0;
}

legend {
  padding: 0;
}

ol,
ul,
menu {
  list-style: none;
  margin: 0;
  padding: 0;
}

/*
Reset default styling for dialogs.
*/

dialog {
  padding: 0;
}

/*
Prevent resizing textareas horizontally by default.
*/

textarea {
  resize: vertical;
}

/*
1. Reset the default placeholder opacity in Firefox. (https://github.com/tailwindlabs/tailwindcss/issues/3300)
2. Set the default placeholder color to the user's configured gray 400 color.
*/

input::-moz-placeholder, textarea::-moz-placeholder {
  opacity: 1; /* 1 */
  color: #9ca3af; /* 2 */
}

input::placeholder,
textarea::placeholder {
  opacity: 1; /* 1 */
  color: #9ca3af; /* 2 */
}

/*
Set the default cursor for buttons.
*/

button,
[role="button"] {
  cursor: pointer;
}

/*
Make sure disabled buttons don't get the pointer cursor.
*/

:disabled {
  cursor: default;
}

/*
1. Make replaced elements `display: block` by default. (https://github.com/mozdevs/cssremedy/issues/14)
2. Add `vertical-align: middle` to align replaced elements more sensibly by default. (https://github.com/jensimmons/cssremedy/issues/14#issuecomment-634934210)
   This can trigger a poorly considered lint error in some tools but is included by design.
*/

img,
svg,
video,
canvas,
audio,
iframe,
embed,
object {
  display: block; /* 1 */
  vertical-align: middle; /* 2 */
}

/*
Constrain images and videos to the parent width and preserve their intrinsic aspect ratio. (https://github.com/mozdevs/cssremedy/issues/14)
*/

img,
video {
  max-width: 100%;
  height: auto;
}

/* Make elements with the HTML hidden attribute stay hidden by default */

[hidden]:where(:not([hidden="until-found"])) {
  display: none;
}

:root {

    --background: 215 25% 70%;

    --card: 215 30% 85%;

    --gradient-hero: radial-gradient(ellipse 80% 50% at 50% 0%, hsl(var(--primary) / 0.1), transparent 60%);

    --shadow-card: 0 8px 30px hsl(215 50% 30% / 0.12);

    --shadow-elevated: 0 20px 40px hsl(215 50% 30% / 0.15);



    /* Sidebar */

    --sidebar-background: 215 30% 85%;

    --sidebar-foreground: 220 25% 15%;

    --sidebar-primary: 215 60% 45%;

    --sidebar-primary-foreground: 0 0% 100%;

    --sidebar-accent: 215 25% 80%;

    --sidebar-accent-foreground: 220 25% 15%;

    --sidebar-border: 215 20% 78%;

    --sidebar-ring: 215 60% 45%;



    /* Chart colors */

    --chart-1: 215 60% 45%;

    --chart-2: 195 71% 52%;

    --chart-3: 280 65% 60%;

    --chart-4: 45 93% 50%;

    --chart-5: 142 71% 45%;



    /* Star rating color */

    /* Font families - Premium Typography */

    --font-display: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;

    --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;



    /* Typography Scale - Fluid & Responsive */

    --text-xs: clamp(0.6875rem, 0.65rem + 0.1vw, 0.75rem);

    /* 11-12px */

    --text-sm: clamp(0.8125rem, 0.775rem + 0.15vw, 0.875rem);

    /* 13-14px */

    --text-base: clamp(0.9375rem, 0.9rem + 0.15vw, 1rem);

    /* 15-16px */

    --text-lg: clamp(1.0625rem, 1rem + 0.25vw, 1.125rem);

    /* 17-18px */

    --text-xl: clamp(1.1875rem, 1.1rem + 0.35vw, 1.25rem);

    /* 19-20px */

    --text-2xl: clamp(1.375rem, 1.25rem + 0.5vw, 1.5rem);

    /* 22-24px */

    --text-3xl: clamp(1.75rem, 1.5rem + 1vw, 1.875rem);

    /* 28-30px */

    --text-4xl: clamp(2rem, 1.75rem + 1vw, 2.25rem);

    /* 32-36px */

    --text-5xl: clamp(2.5rem, 2rem + 2vw, 3rem);

    /* 40-48px */

    --text-6xl: clamp(3rem, 2.5rem + 2vw, 3.75rem);

    /* 48-60px */



    /* Line Heights - Optimized for readability */

    --leading-none: 1;

    --leading-tight: 1.15;

    --leading-snug: 1.3;

    --leading-normal: 1.5;

    --leading-relaxed: 1.625;

    --leading-loose: 1.75;

    --tracking-tighter: -0.03em;

    --tracking-tight: -0.015em;

    --tracking-normal: 0;

    --tracking-wide: 0.015em;

    --tracking-wider: 0.03em;

    --tracking-widest: 0.08em;

/* Premium Typography Hierarchy */

  }

/* Card animations */

.card-hover {

    transition-property: all; transition-timing-function: cubic-bezier(0, 0, 0.2, 1);

    transition-duration: 400ms;

  }

.card-hover:hover {

    transform: translateY(-0.5rem);

    box-shadow: 0 20px 40px hsl(215 50% 30% / 0.18), 0 0 20px hsl(var(--primary) / 0.08);

  }

/* Premium card rim-light on hover */

.card-rim-light {

    position: relative;

  }

.card-rim-light::before {

    content: '';

    position: absolute;

    inset: -1px;

    border-radius: inherit;

    padding: 1px;

    background: linear-gradient(135deg,

        hsl(var(--primary) / 0) 0%,

        hsl(var(--primary) / 0) 40%,

        hsl(var(--primary) / 0) 100%);

    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

    -webkit-mask-composite: xor;

    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

    -webkit-mask-composite: xor;

            mask-composite: exclude;

    transition: background 0.5s ease, opacity 0.5s ease;

    opacity: 0;

    pointer-events: none;

    z-index: 2;

  }

.card-rim-light:hover::before {

    background: linear-gradient(135deg,

        hsl(var(--primary) / 0.6) 0%,

        hsl(var(--secondary) / 0.3) 50%,

        hsl(var(--primary) / 0.6) 100%);

    opacity: 1;

  }

/* Hero card style */

.hero-card {

    position: relative; border-radius: 1rem; overflow: hidden; background-color: hsl(var(--card) / 0.8); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);

    box-shadow: var(--shadow-card);

    transition: all 0.3s ease;

  }

.hero-card:hover {

    box-shadow: var(--shadow-elevated);

  }

/* Category chip */

.category-chip {

    display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);

    background-color: hsl(var(--card) / 0.7); border-width: 1px; border-color: hsl(var(--border) / 0.4); color: hsl(var(--muted-foreground)); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);

  &:hover {

    color: hsl(var(--foreground));

    background-color: hsl(var(--card));

  }

  }

.category-chip.active {

    background-color: hsl(var(--foreground)); color: hsl(var(--background)); border-color: hsl(var(--foreground)); box-shadow: var(--shadow-sm, 0 1px 2px 0 rgba(0, 0, 0, 0.05));

  }

  }

.section-title {

    position: relative; display: flex; align-items: center; gap: 0.75rem;

  }

.section-title::before {

    content: '';

    height: 1.2em;

/* Animated border beam — subtle border glow */

.border-beam {

    position: relative;

  }

.border-beam::after {

    content: '';

    position: absolute;

    inset: 0;

    border-radius: inherit;

    padding: 1.5px;

    background: conic-gradient(from var(--beam-angle, 0deg),

        transparent 0%,

        transparent 70%,

        hsl(var(--primary) / 0.6) 80%,

        hsl(var(--secondary) / 0.4) 90%,

        transparent 100%);

    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

    -webkit-mask-composite: xor;

    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

    -webkit-mask-composite: xor;

            mask-composite: exclude;

    animation: border-beam-spin 4s linear infinite;

    pointer-events: none;

    opacity: 0.7;

  }

.group:hover .play-ring-pulse::before {

    content: '';

    inset: -4px;

    border-radius: 9999px;

    border: 2px solid hsl(var(--primary) / 0.5);

    animation: ring-expand 1.8s ease-out infinite;

.metallic-number {

    background: linear-gradient(180deg,

        hsl(45 100% 65%) 25%,

        hsl(35 100% 50%) 50%,

        hsl(25 100% 40%) 75%,

/* Moviebay Design System - Premium Typography & Modern Light Blue-Gray Theme */

@media (prefers-color-scheme: dark) {

  :root:not(.light):not(.dark) {

    --background: 230 18% 5%;

    --foreground: 210 40% 98%;

    --card: 230 20% 9%;

    --card-foreground: 210 40% 98%;

    --popover: 230 22% 11%;

    --popover-foreground: 210 40% 98%;

    --primary: 210 100% 60%;

    --primary-foreground: 0 0% 100%;

    --secondary: 180 70% 50%;

    --secondary-foreground: 0 0% 100%;

    --muted: 230 12% 22%;

    --muted-foreground: 215 15% 60%;

    --accent: 230 18% 15%;

    --accent-foreground: 210 40% 98%;

    --border: 230 15% 16%;

    --input: 230 18% 13%;

    --ring: 210 100% 60%;

  }



  :root:not(.light):not(.dark) body {

    background-image:

      radial-gradient(ellipse 120% 60% at 10% -10%, hsl(210 100% 60% / 0.08), transparent 50%),

      radial-gradient(ellipse 100% 50% at 90% 0%, hsl(180 70% 50% / 0.06), transparent 50%),

/* Film grain noise texture overlay — subtle cinematic texture across the whole app */

body::before {

  content: '';

  position: fixed;

  inset: 0;

  opacity: 0.024;

  pointer-events: none;

  z-index: 9999;

  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");

  background-repeat: repeat;

  background-size: 192px 192px;

  mix-blend-mode: overlay;

}

  0%,

  25% {

  66% {

/* Glowing custom scrollbar — desktop only */

@media (min-width: 768px) {

  ::-webkit-scrollbar {

    width: 5px;

    height: 5px;

  ::-webkit-scrollbar-track {

    background: transparent;

  ::-webkit-scrollbar-thumb {

    background: hsl(var(--primary) / 0.45);

    border-radius: 99px;

    box-shadow: 0 0 10px hsl(var(--primary) / 0.35);

    -webkit-transition: background 0.2s ease;

    transition: background 0.2s ease;

    box-shadow: 0 0 16px hsl(var(--primary) / 0.5);
